name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate repository
    runs-on: ubuntu-24.04
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Check version, encoding, and Unix LF
        run: python3 .github/scripts/check-repository.py

      - name: Check shell syntax
        run: |
          git ls-files -z '*.sh' 'rpm/SOURCES/*' \
            | xargs -0 -r -n1 bash -n

      - name: Run ShellCheck
        run: |
          git ls-files -z '*.sh' 'rpm/SOURCES/*' \
            | xargs -0 -r shellcheck --severity=error --shell=bash

      - name: Check Dockerfile
        run: docker build --check .
